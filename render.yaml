services:
  - type: web
    name: buildmaster-ai
    env: node
    plan: starter
    buildCommand: npm install && npm run render-build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_NAME
        value: BuildMaster AI
      - key: CRON_SECRET
        sync: false
      - key: AUTHORIZED_CARDS_FEED_URL
        sync: false
      - key: AUTHORIZED_CARDS_FEED_TOKEN
        sync: false
      - key: SYNC_SOURCE_NAME
        value: Minha Fonte Autorizada
